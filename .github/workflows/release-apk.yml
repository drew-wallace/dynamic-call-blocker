name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build-tools
        run: sdkmanager "build-tools;34.0.0"

      - name: Install Android build-tools for signing action compatibility
        run: sdkmanager "build-tools;29.0.3"

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Decode signing keystore
        if: ${{ env.KEYSTORE_BASE64 != '' && env.KEYSTORE_PASSWORD != '' && env.KEY_ALIAS != '' && env.KEY_PASSWORD != '' }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore

      - name: Sign release APK
        id: sign_apk
        if: ${{ env.KEYSTORE_BASE64 != '' && env.KEYSTORE_PASSWORD != '' && env.KEY_ALIAS != '' && env.KEY_PASSWORD != '' }}
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ env.KEYSTORE_BASE64 }}
          alias: ${{ env.KEY_ALIAS }}
          keyStorePassword: ${{ env.KEYSTORE_PASSWORD }}
          keyPassword: ${{ env.KEY_PASSWORD }}

      - name: Resolve APK path
        id: apk
        shell: bash
        run: |
          if [ -n "${{ steps.sign_apk.outputs.signedReleaseFile }}" ] && [ -f "${{ steps.sign_apk.outputs.signedReleaseFile }}" ]; then
            APK_PATH="${{ steps.sign_apk.outputs.signedReleaseFile }}"
          else
            APK_PATH="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          fi

          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "No APK found in app/build/outputs/apk/release" >&2
            exit 1
          fi

          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "Using APK: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.ref_name }}
          path: ${{ steps.apk.outputs.apk_path }}

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.apk.outputs.apk_path }}
          overwrite_files: true
